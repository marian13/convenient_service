##
# CI using GitHub Actions.
#
# NOTE: GitHub Actions DSL.
# - https://docs.github.com/en/actions/learn-github-actions/understanding-github-actions#understanding-the-workflow-file
# - https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
#
# NOTE: Ruby workflow example.
# - https://github.com/ruby/setup-ruby#usage
#
# NOTE: Building and testing Ruby.
# - https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-ruby
#
# NOTE: More examples.
# - https://gist.github.com/geonizeli/57376c15f23feecdabf5ea213c3d7f41
# - https://docs.knapsackpro.com/2019/how-to-run-rspec-on-github-actions-for-ruby-on-rails-app-using-parallel-jobs
#
# NOTE: Sharing data between jobs and post-workflow artifacts.
# - https://docs.github.com/en/actions/learn-github-actions/essential-features-of-github-actions#sharing-data-between-jobs
# - https://github.com/actions/upload-artifact
# - https://github.com/actions/download-artifact
#
# NOTE: Virtual Environments.
# - https://github.com/actions/virtual-environments
#
# NOTE: How to collect and upload coverage reports for Coveralls?
# - https://github.com/marketplace/actions/coveralls-github-action#complete-parallel-job-example
# - https://github.com/coverallsapp/github-action/issues/29
# - https://github.com/coverallsapp/github-action/issues/29#issuecomment-704366557
#
# NOTE: What is the purpose of bundle-audit?
# - https://github.com/rubysec/bundler-audit
#
# IMPORTANT: This workflow is heavily based on Shopify/packwerk workflow.
# - https://github.com/Shopify/packwerk/blob/main/.github/workflows/ci.yml
# - https://github.com/Shopify/packwerk/actions/runs/331834549/workflow
#
name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  ##
  # NOTE: `workflow_call` allows to reuse workflows.
  # - https://docs.github.com/en/actions/how-tos/reuse-automations/reuse-workflows
  #
  workflow_call:
    inputs:
      repository:
        required: false
        type: string
      ref:
        required: false
        type: string
      submodules:
        required: false
        type: boolean
        default: false
      bundle_gemfile_dir:
        required: false
        type: string
        default: '.'

##
# NOTE: `BUNDLE_PATH` is set globally so bundler installs gems into a predictable directory.
# This allows `actions/cache` to cache both main and appraisal gems under a single path across all jobs.
#
env:
  BUNDLE_PATH: vendor/bundle
  CONVENIENT_SERVICE_CI: true

jobs:
  lint:
    ##
    # NOTE: If there are no memory, performance, or cost constraints, prefer to use as standard Linux distribution as it is possible.
    # In a general case, you simply won't have enough time to resolve all the "quirks" of more specific distributions if you are an application developer.
    # That is why the well-known Ubuntu is used.
    # - https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#choosing-github-hosted-runners
    #
    runs-on: ubuntu-24.04
    name: Lint
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/${{ inputs.bundle_gemfile_dir || '.' }}/Gemfile

    steps:
      - uses: marian13/ensure-source-branch-contains-destination-branch@v1
      - uses: actions/checkout@v7
        with:
          ##
          # NOTE: `actions/checkout@v7` uses default values when an option is not provided or is an empty string.
          # - https://github.com/actions/checkout#usage
          # - https://github.com/actions/checkout/blob/v7.0.0/src/input-helper.ts#L23
          #
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          submodules: ${{ inputs.submodules }}
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0
          ##
          # NOTE: `bundler-cache: true` is intentionally omitted.
          # `task install` runs `bundle install` and `bin/appraisal install`.
          # Using `actions/cache` instead allows caching both main and appraisal gems under a single combined key.
          #
      ##
      # NOTE: `CACHE_WEEK` is used to automatically invalidate the cache every week.
      #
      - name: Set cache week
        run: echo "CACHE_WEEK=$(date +%Y-%U)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: |
            vendor/bundle
            gemfiles/vendor/bundle
          key: ${{ runner.os }}-4.0-gems-${{ hashFiles('Gemfile', 'Appraisals') }}-${{ env.CACHE_WEEK }}
          restore-keys: ${{ runner.os }}-4.0-gems-
      ##
      # NOTE: Installs Task (task runner). Repo token is required to increase API quota.
      # - https://taskfile.dev/installation/#github-actions
      # - https://github.com/go-task/task
      # - https://github.com/arduino/setup-task?tab=readme-ov-file#repo-token
      #
      - name: Install Task (task runner)
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install dependencies
        run: task install
      - name: Run Rubocop
        run: task rubocop
      - name: Run Yard-Junk (docs linter)
        run: task docs:lint

  test:
    needs:
      - lint
    ##
    # NOTE: If there are no memory, performance, or cost constraints, prefer to use as standard Linux distribution as it is possible.
    # In a general case, you simply won't have enough time to resolve all the "quirks" of more specific distributions if you are an application developer.
    # That is why the well-known Ubuntu is used.
    # - https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#choosing-github-hosted-runners
    #
    # NOTE: List of all possible Ruby, JRuby versions.
    # - https://github.com/ruby/setup-ruby/blob/master/ruby-builder-versions.json
    #
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        gemfile:
          - Gemfile
        ruby:
          - 2.7
          ##
          # NOTE: 3.0 is wrapped by quotes in order to avoid misparsing it as integer.
          # - https://github.com/actions/runner/issues/849
          #
          - "3.0"
          - 3.1
          - 3.2
          - 3.3
          - 3.4
          - "4.0"
          ##
          # NOTE: JRuby 9.4 aims CRuby 3.1 compatibility.
          # - https://www.jruby.org/download
          #
          - "jruby-9.4"
          ##
          # NOTE: JRuby 9.4 aims CRuby 3.4 compatibility.
          # - https://www.jruby.org/download
          #
          # TODO: Check JRuby 10.0.3.
          # - https://www.jruby.org/2026/02/02/jruby-10-0-3-0.html
          #
          - "jruby-10.0.2"
          ##
          # NOTE: JRuby 10.1 aims CRuby 4.0 compatibility.
          # - https://www.jruby.org/2026/04/21/jruby-10-1-0-0.html
          #
          # - "jruby-10.1"
        experimental: [false]
        ##
        # NOTE: How to skip failures for specific Ruby versions?
        # - https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/run-job-variations#handling-failures
        #
        include:
          ##
          # NOTE: TruffleRuby 22.3 aims CRuby 3.1 compatibility.
          # - https://github.com/oracle/truffleruby/blob/master/doc/user/compatibility.md
          # - https://github.com/oracle/truffleruby/issues/2733
          # - https://github.com/oracle/truffleruby/releases/tag/vm-22.3.0
          #
          # IMPORTANT: TruffleRuby 22.3 is currently disabled since too many specs are failing due to CRuby uncompatible code.
          #
          # NOTE: Use `RUBY_ENGINE=truffleruby RUBY_VERSION=22.3 task docker:bash` and then `task rspec` to reproduce them locally.
          #
          # TODO: Make ConvenientService TruffleRuby 22.3 compatible.
          #
          # - "truffleruby-22.3"
          # - "truffleruby-24.0"
          - gemfile: Gemfile
            ruby: "truffleruby-25.0"
            experimental: true
            env:
              ##
              # NOTE: `-Xmx4g` means max heap of 4 GB.
              # - https://docs.oracle.com/javase/8/docs/technotes/guides/vm/gctuning/sizing.html
              #
              # NOTE: `-Xms1g` means startup heap of 1 GB.
              # - https://docs.oracle.com/javase/8/docs/technotes/guides/vm/gctuning/sizing.html
              #
              JAVA_OPTS: "-Xmx4g -Xms1g"
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/${{ inputs.bundle_gemfile_dir || '.' }}/${{ matrix.gemfile }}



    name: "Test Ruby `${{ matrix.ruby }}`"
    steps:
      - uses: actions/checkout@v7
        with:
          ##
          # NOTE: `actions/checkout@v7` uses default values when an option is not provided or is an empty string.
          # - https://github.com/actions/checkout#usage
          # - https://github.com/actions/checkout/blob/v7.0.0/src/input-helper.ts#L23
          #
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          submodules: ${{ inputs.submodules }}
      - name: "Set up Ruby `${{ matrix.ruby }}`"
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          ##
          # NOTE: `bundler-cache: true` is intentionally omitted.
          # `task install` runs `bundle install` and `bin/appraisal install`.
          # Using `actions/cache` instead allows caching both main and appraisal gems under a single combined key.
          #
      ##
      # NOTE: `CACHE_WEEK` is used to automatically invalidate the cache every week.
      #
      - name: Set cache week
        run: echo "CACHE_WEEK=$(date +%Y-%U)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: |
            vendor/bundle
            gemfiles/vendor/bundle
          key: ${{ runner.os }}-${{ matrix.ruby }}-gems-${{ hashFiles('Gemfile', 'Appraisals') }}-${{ env.CACHE_WEEK }}
          restore-keys: ${{ runner.os }}-${{ matrix.ruby }}-gems-
      ##
      # NOTE: Installs Task (task runner). Repo token is required to increase API quota.
      # - https://taskfile.dev/installation/#github-actions
      # - https://github.com/go-task/task
      # - https://github.com/arduino/setup-task?tab=readme-ov-file#repo-token
      #
      - name: Install Task (task runner)
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install dependencies
        run: task install
      - name: Run RSpec without appraisals
        run: task rspec
        ##
        # NOTE: Skip `truffleruby` failures.
        # - https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/run-job-variations#handling-failures
        # - https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#jobsjob_idcontinue-on-error
        # - https://docs.github.com/en/actions/reference/workflows-and-actions/expressions#startswith
        #
        continue-on-error: ${{ matrix.experimental }}
      - name: Run RSpec with Rails 8.1
        run: APPRAISAL=rails_8.1 task rspec
        continue-on-error: ${{ matrix.experimental }}
      - name: Run RSpec with Dry
        run: APPRAISAL=dry task rspec
        continue-on-error: ${{ matrix.experimental }}
      - name: Run RSpec with Awesome Print
        run: APPRAISAL=awesome_print task rspec
        continue-on-error: ${{ matrix.experimental }}
      - name: Run RSpec with Amazing Print
        run: APPRAISAL=amazing_print task rspec
        continue-on-error: ${{ matrix.experimental }}
      - name: Run RSpec with MemoWise
        run: APPRAISAL=memo_wise task rspec
        continue-on-error: ${{ matrix.experimental }}
      - name: Run RSpec with Rails 8.0
        run: APPRAISAL=rails_8.0 task rspec
        continue-on-error: ${{ matrix.experimental }}
      - name: Run RSpec with Rails 7.2
        run: APPRAISAL=rails_7.2 task rspec
        continue-on-error: ${{ matrix.experimental }}
      - name: Run RSpec with Rails 7.1
        run: APPRAISAL=rails_7.1 task rspec
        continue-on-error: ${{ matrix.experimental }}
      - name: Run RSpec with Rails 7.0
        run: APPRAISAL=rails_7.0 task rspec
        continue-on-error: ${{ matrix.experimental }}
      - name: Run RSpec with Rails 6.1
        run: APPRAISAL=rails_6.1 task rspec
        continue-on-error: ${{ matrix.experimental }}
      - name: Run RSpec with Rails 6.0
        run: APPRAISAL=rails_6.0 task rspec
        continue-on-error: ${{ matrix.experimental }}
      - name: Run RSpec with Rails 5.2
        run: APPRAISAL=rails_5.2 task rspec
        continue-on-error: ${{ matrix.experimental }}
      - name: Run Minitest
        run: task minitest
        continue-on-error: ${{ matrix.experimental }}
      ##
      # NOTE: `lcov-result-merger` is written in JS.
      #
      - name: Set up Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
      ##
      # NOTE: `lcov-result-merger` docs.
      # - https://github.com/mweibel/lcov-result-merger
      #
      # NOTE: `npx --yes` option.
      # - https://stackoverflow.com/questions/70742968/automatically-accept-installing-npx-package
      #
      # NOTE: `lcov-result-merger` uses `vinyl-fs` for globs which in turn uses `node-glob`.
      # - https://github.com/mweibel/lcov-result-merger/blob/v3.3.0/bin/lcov-result-merger.js#L38
      # - https://github.com/gulpjs/vinyl-fs#srcglobs-options
      # - https://github.com/isaacs/node-glob#glob-primer
      #
      # NOTE: Append `&& cat coverage/lcov.info` to debug.
      #
      # IMPORTANT: 'coverage/**/lcov.info' single quotes are mandatory.
      #
      - name: Merge coverage reports into single file
        run: task coverage:lcov:merge
        continue-on-error: ${{ matrix.experimental }}
      - name: Configure coverage reports for Coveralls
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.github_token }}
          flag-name: run-${{ matrix.ruby }}-${{ matrix.gemfile }}
          parallel: true
          path-to-lcov: "./coverage/lcov.info"
        continue-on-error: ${{ matrix.experimental }}

  coverage:
    needs:
      - test
    ##
    # NOTE: If there are no memory, performance, or cost constraints, prefer to use as standard Linux distribution as it is possible.
    # In a general case, you simply won't have enough time to resolve all the "quirks" of more specific distributions if you are an application developer.
    # That is why the well-known Ubuntu is used.
    # - https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#choosing-github-hosted-runners
    #
    runs-on: ubuntu-24.04
    name: Gather coverage
    steps:
      - name: Upload coverage reports to Coveralls
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.github_token }}
          parallel-finished: true

  benchmark:
    needs:
      - test
    runs-on: ubuntu-24.04
    continue-on-error: true
    strategy:
      matrix:
        gemfile:
          - Gemfile
        ruby:
          - 2.7
          - "3.0"
          - 3.1
          - 3.2
          - 3.3
          - 3.4
          - "4.0"
          - "jruby-9.4"
          - "jruby-10.0"
          ##
          # HACK: Sorry, JRuby, but fixes like the following is probably too much, I need to finish v1 docs first:
          #   if ConvenientService::Dependencies.ruby.match?("jruby >= 10.1")
          #     ##
          #     # @api private
          #     #
          #     # @return [void]
          #     #
          #     def define!
          #       x = container
          #       y = index
          #
          #       outputs.each { |output| output.define_output_in_container!(x, index: y) }
          #
          #       true
          #     end
          #   else
          #     ##
          #     # @api private
          #     #
          #     # @return [void]
          #     #
          #     def define!
          #       outputs.each { |output| output.define_output_in_container!(container, index: index) }
          #
          #       true
          #     end
          #   end
          #
          # - "jruby-10.1"
        include:
          - gemfile: Gemfile
            ruby: "truffleruby-25.0"
            env:
              ##
              # NOTE: `-Xmx4g` means max heap of 4 GB.
              # - https://docs.oracle.com/javase/8/docs/technotes/guides/vm/gctuning/sizing.html
              #
              # NOTE: `-Xms1g` means startup heap of 1 GB.
              # - https://docs.oracle.com/javase/8/docs/technotes/guides/vm/gctuning/sizing.html
              #
              JAVA_OPTS: "-Xmx4g -Xms1g"
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/${{ inputs.bundle_gemfile_dir || '.' }}/${{ matrix.gemfile }}
      CONVENIENT_SERVICE_BENCHMARK: true



    name: "Benchmark Ruby `${{ matrix.ruby }}`"
    steps:
      - uses: actions/checkout@v7
        with:
          ##
          # NOTE: `actions/checkout@v7` uses default values when an option is not provided or is an empty string.
          # - https://github.com/actions/checkout#usage
          # - https://github.com/actions/checkout/blob/v7.0.0/src/input-helper.ts#L23
          #
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          submodules: ${{ inputs.submodules }}
      - name: "Set up Ruby `${{ matrix.ruby }}`"
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          ##
          # NOTE: `bundler-cache: true` is intentionally omitted.
          # `task install` runs `bundle install` and `bin/appraisal install`.
          # Using `actions/cache` instead allows caching both main and appraisal gems under a single combined key.
          #
      ##
      # NOTE: `CACHE_WEEK` is used to automatically invalidate the cache every week.
      #
      - name: Set cache week
        run: echo "CACHE_WEEK=$(date +%Y-%U)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: |
            vendor/bundle
            gemfiles/vendor/bundle
          key: ${{ runner.os }}-${{ matrix.ruby }}-gems-${{ hashFiles('Gemfile', 'Appraisals') }}-${{ env.CACHE_WEEK }}
          restore-keys: ${{ runner.os }}-${{ matrix.ruby }}-gems-
      - name: Install Task (task runner)
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install dependencies
        run: task install
      - run: ruby benchmark/implementation/commit_config/ips.rb
        continue-on-error: true
      - run: ruby benchmark/implementation/commit_config/profile.rb
        continue-on-error: true
      ##
      # TODO: Shorter output.
      #
      # - run: ruby benchmark/implementation/empty_service/ips.rb
      #   continue-on-error: true
      - run: ruby benchmark/implementation/has_committed_config/ips.rb
        continue-on-error: true
      - run: ruby benchmark/implementation/has_committed_config/profile.rb
        continue-on-error: true
      - run: ruby benchmark/implementation/regular_service/memory.rb
        continue-on-error: true
      - run: ruby benchmark/initial_load/require/get_process_mem.rb
        continue-on-error: true
      ##
      # TODO: Shorter output.
      #
      # - run: ruby benchmark/initial_load/require/memory_profiler_objects.rb
      #   continue-on-error: true
      - run: ruby benchmark/load/deeply_nested_steps/bm.rb
        continue-on-error: true
      - run: ruby benchmark/load/deeply_nested_steps_with_rollbacks/bm.rb
        continue-on-error: true
      - run: ruby benchmark/load/deeply_nested_steps_without_rollbacks/bm.rb
        continue-on-error: true
      - run: ruby benchmark/load/many_connected_steps/bm.rb
        continue-on-error: true
      - run: ruby benchmark/load/many_included_modules/bm.rb
        continue-on-error: true
      - run: ruby benchmark/load/many_included_modules_with_missing_method/bm.rb
        continue-on-error: true
      - run: ruby benchmark/load/many_middlewares/bm.rb
        continue-on-error: true
      - run: ruby benchmark/load/many_nested_middlewares/bm.rb
        continue-on-error: true
      - run: ruby benchmark/load/many_sequential_steps/bm.rb
        continue-on-error: true
